{% extends 'base.html' %}

{% block header %}
<h1 class="text-center">{% block title %}Registrazione{% endblock %}</h1>
{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="card shadow p-4">
            {% if error %}
            <div class="alert alert-danger">{{ error }}</div>
            {% endif %}
            {% if success %}
            <div class="alert alert-success">{{ success }}</div>
            {% endif %}

            <form method="POST">
                <div class="mb-3">
                    <label class="form-label">Username</label>
                    <input type="text" name="username" class="form-control" required>
                </div>
                <div class="mb-3">
                    <label class="form-label">Password</label>
                    <input type="password" name="password" class="form-control" required>
                </div>
                <div class="mb-3">
                    <label class="form-label">Conferma Password</label>
                    <input type="password" name="confirm" class="form-control" required>
                </div>
                <button type="submit" class="btn w-100" style="background-color: var(--red); color: #fff; border: none;">Registrati</button>
            </form>

            <div class="text-center mt-3">
                <p class="mb-0">Hai già un account? <a href="{{ url_for('auth.login') }}">Accedi qui</a></p>
            </div>
        </div>
    </div>
</div>
{% endblock %}
